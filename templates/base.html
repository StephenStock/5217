<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lodge Treasurer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">Lodge Admin</p>
      <h1>Lodge Treasurer</h1>
    </div>
    <p class="subtitle">A starter app for dues, dinners, and member administration.</p>
  </header>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/site.js') }}"></script>
</body>
</html>
